<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}OrderTrack{% endblock %}</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root { --navy: #0f1c2e; --navy2: #1a2d45; --accent2: #5bb8f5; --text: #e8edf3; --muted: #8fa3bc; }
    body { background: var(--navy); color: var(--text); font-family: 'DM Sans', sans-serif; }
    .card-panel { background: var(--navy2); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .list-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .btn-icon { background: none; border: none; color: var(--muted); cursor: pointer; transition: 0.2s; }
    .btn-icon:hover { color: #fff; }
    .badge-card { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .bg-sbi { background: #003399; } .bg-hdfc { background: #ed232a; } .bg-icici { background: #f37021; }
  </style>
</head>
<body>
<div class="container py-4">
  <nav class="mb-4">
    <a href="/" class="btn btn-sm {% if active == 'main' %}btn-primary{% else %}btn-outline-light{% endif %}">Main Orders</a>
    <a href="/secondary" class="btn btn-sm {% if active == 'secondary' %}btn-primary{% else %}btn-outline-light{% endif %}">Secondary</a>
    <a href="/settings" class="btn btn-sm {% if active == 'settings' %}btn-primary{% else %}btn-outline-light{% endif %}">Settings</a>
  </nav>
  {% block content %}{% endblock %}
</div>

<script>
  async function api(url, method='GET', body=null) {
    const opts = { method, headers: {'Content-Type': 'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res.json();
  }
  function cardBadge(type) {
    const t = (type || 'OTHER').toUpperCase();
    let cls = 'bg-secondary';
    if (['SBI','HDFC','ICICI','AXIS'].includes(t)) cls = 'bg-primary';
    if (t === 'ONECARD') cls = 'bg-dark';
    return `<span class="badge-card ${cls}">${t}</span>`;
  }
  function formatCost(v) { return '₹' + parseFloat(v || 0).toLocaleString('en-IN'); }
  function showToast(m) { alert(m); } // Simple alert for reliability
</script>
</body>
</html>
