{% extends 'base.html' %}
{% set active = 'main' %}
{% block title %}Main Orders — OrderTrack{% endblock %}

{% block content %}
<div class="card-panel">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Main Orders</h4>
    <button class="btn btn-primary btn-sm" onclick="document.getElementById('addForm').style.display='block'">+ Add Order</button>
  </div>

  <div id="addForm" class="mb-4 p-3 border rounded" style="display:none; background: rgba(0,0,0,0.2);">
    <div class="row g-2">
      <div class="col-md-2"><input type="text" id="f_digits" class="form-control" placeholder="Digits" oninput="onDigits(this.value)"></div>
      <div class="col-md-2"><input type="text" id="f_type" class="form-control" readonly placeholder="Bank"></div>
      <div class="col-md-2"><input list="p_list" id="f_plat" class="form-control" placeholder="Platform"></div>
      <div class="col-md-3"><input type="text" id="f_name" class="form-control" placeholder="Order Name"></div>
      <div class="col-md-3"><input list="m_list" id="f_model" class="form-control" placeholder="Model"></div>
      <div class="col-md-2"><input type="number" id="f_cost" class="form-control" placeholder="Cost"></div>
      <div class="col-md-2"><button class="btn btn-success w-100" onclick="saveOrder()">Save</button></div>
    </div>
  </div>

  <table class="table table-dark table-hover small">
    <thead><tr><th>Card</th><th>Platform</th><th>Order Name</th><th>Mobile</th><th>Cost</th><th>Action</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<datalist id="p_list"></datalist><datalist id="m_list"></datalist>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content bg-dark border-secondary">
    <div class="modal-body p-4">
      <input type="hidden" id="e_id">
      <label class="small text-muted">Bank Name</label>
      <select id="e_type" class="form-select mb-3">
        <option>SBI</option><option>ICICI</option><option>AXIS</option><option>BOB</option>
        <option>FEDERAL</option><option>HDFC</option><option>IDFC</option><option>INDUSIND</option>
        <option>KOTAK</option><option>RBL</option><option>YES</option><option>ONECARD</option>
      </select>
      <button class="btn btn-primary w-100" onclick="updateOrder()">Update</button>
    </div>
  </div></div>
</div>

<script>
let orders = []; let cards = [];
async function init() {
  const [o, c, p, m] = await Promise.all([api('/api/main-orders'), api('/api/cards'), api('/api/platforms'), api('/api/models')]);
  orders = o; cards = c;
  document.getElementById('p_list').innerHTML = p.map(x => `<option value="${x.platform_name}">`).join('');
  document.getElementById('m_list').innerHTML = m.map(x => `<option value="${x.model_name}">`).join('');
  render();
}
function render() {
  document.getElementById('tbody').innerHTML = orders.map(o => `
    <tr>
      <td>${o.last_digits} ${cardBadge(o.card_type)}</td>
      <td>${o.platform}</td>
      <td>${o.order_name}</td>
      <td>${o.model}</td>
      <td>${formatCost(o.costing)}</td>
      <td>
        <button class="btn-icon" onclick="openEdit(${o.id})"><i class="bi bi-pencil"></i></button>
        <button class="btn-icon text-danger" onclick="del(${o.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}
function onDigits(v) { const c = cards.find(x => x.last_digits === v); document.getElementById('f_type').value = c ? c.card_type : ''; }
async function saveOrder() {
  const d = { last_digits: document.getElementById('f_digits').value, card_type: document.getElementById('f_type').value, platform: document.getElementById('f_plat').value, order_name: document.getElementById('f_name').value, model: document.getElementById('f_model').value, costing: document.getElementById('f_cost').value, account: 'N/A' };
  await api('/api/main-orders', 'POST', d); location.reload();
}
async function del(id) { if(confirm('Delete?')) { await api('/api/main-orders/'+id, 'DELETE'); init(); } }
window.onload = init;
</script>
{% endblock %}
