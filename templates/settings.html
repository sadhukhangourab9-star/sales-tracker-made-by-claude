{% extends 'base.html' %}
{% set active = 'settings' %}
{% block title %}Settings — OrderTrack{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Settings</div>
    <div class="page-subtitle">Manage your cards, platforms and mobile models/variants</div>
  </div>
</div>

<div class="row g-4">
  <div class="col-lg-4">
    <div class="card-panel" style="height:100%;">
      <div class="card-panel-title"><i class="bi bi-credit-card-2-front"></i> Cards</div>
      <div class="row g-2 mb-3">
        <div class="col-7">
          <label class="form-label">Last 4–5 Digits</label>
          <input type="text" id="card_digits" class="form-control" placeholder="e.g. 4521" maxlength="5"/>
        </div>
        <div class="col-5">
          <label class="form-label">Bank Name</label>
          <select id="card_type" class="form-select">
            <option value="">Select</option>
            <option>SBI</option>
            <option>ICICI</option>
            <option>AXIS</option>
            <option>BOB</option>
            <option>FEDERAL</option>
            <option>HDFC</option>
            <option>IDFC</option>
            <option>INDUSIND</option>
            <option>KOTAK</option>
            <option>RBL</option>
            <option>YES</option>
            <option>ONECARD</option>
          </select>
        </div>
        <div class="col-12 mt-2">
          <button class="btn btn-primary w-100" onclick="addCard()">Add Card</button>
        </div>
      </div>
      <div id="cardsList"></div>
    </div>
  </div>

  <div class="col-lg-4">
    <div class="card-panel" style="height:100%;">
      <div class="card-panel-title"><i class="bi bi-shop"></i> Platforms</div>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label">Platform</label>
          <input type="text" id="plat_name" class="form-control" placeholder="Amazon"/>
        </div>
        <div class="col-6">
          <label class="form-label">Account</label>
          <input type="text" id="plat_acc" class="form-control" placeholder="User1"/>
        </div>
        <div class="col-12 mt-2">
          <button class="btn btn-primary w-100" onclick="addPlatform()">Add Platform</button>
        </div>
      </div>
      <div id="platsList"></div>
    </div>
  </div>

  <div class="col-lg-4">
    <div class="card-panel" style="height:100%;">
      <div class="card-panel-title"><i class="bi bi-phone"></i> Models & Variants</div>
      <div class="mb-3">
        <label class="form-label">New Model Name</label>
        <div class="input-group">
          <input type="text" id="model_name" class="form-control" placeholder="iPhone 15"/>
          <button class="btn btn-primary" onclick="addModel()">Add</button>
        </div>
      </div>
      <div class="mb-3 pt-2 border-top">
        <label class="form-label">Add Variant to Model</label>
        <select id="variant_model_id" class="form-select mb-2"></select>
        <div class="input-group">
          <input type="text" id="variant_name" class="form-control" placeholder="128GB Blue"/>
          <button class="btn btn-primary" onclick="addVariant()">Add</button>
        </div>
      </div>
      <div id="modelsList"></div>
    </div>
  </div>
</div>

<script>
async function loadCards() {
  const cards = await api('/api/cards');
  document.getElementById('cardsList').innerHTML = cards.map(c => `
    <div class="list-item">
      <div>
        <div style="font-weight:600;">${c.last_digits}</div>
        <div style="font-size:12px;color:var(--muted);">${c.card_type}</div>
      </div>
      <button class="btn-icon text-danger" onclick="deleteCard(${c.id})"><i class="bi bi-trash"></i></button>
    </div>
  `).join('');
}

async function addCard() {
  const digits = document.getElementById('card_digits').value.trim();
  const type   = document.getElementById('card_type').value;
  if (!digits || !type) { showToast('Enter digits and select bank', 'error'); return; }
  await api('/api/cards', 'POST', {last_digits: digits, card_type: type});
  document.getElementById('card_digits').value = '';
  document.getElementById('card_type').value = '';
  showToast('Card added!');
  loadCards();
}

async function deleteCard(id) {
  if (!confirm('Delete this card?')) return;
  await api(`/api/cards/${id}`, 'DELETE');
  showToast('Card deleted.');
  loadCards();
}

async function loadPlatforms() {
  const plats = await api('/api/platforms');
  document.getElementById('platsList').innerHTML = plats.map(p => `
    <div class="list-item">
      <div>
        <div style="font-weight:600;">${p.platform_name}</div>
        <div style="font-size:12px;color:var(--muted);">${p.account_name}</div>
      </div>
      <button class="btn-icon text-danger" onclick="deletePlatform(${p.id})"><i class="bi bi-trash"></i></button>
    </div>
  `).join('');
}

async function addPlatform() {
  const name = document.getElementById('plat_name').value.trim();
  const acc  = document.getElementById('plat_acc').value.trim();
  if (!name || !acc) { showToast('Enter both fields', 'error'); return; }
  await api('/api/platforms', 'POST', {platform_name: name, account_name: acc});
  document.getElementById('plat_name').value = '';
  document.getElementById('plat_acc').value = '';
  showToast('Platform added!');
  loadPlatforms();
}

async function deletePlatform(id) {
  if (!confirm('Delete this platform?')) return;
  await api(`/api/platforms/${id}`, 'DELETE');
  showToast('Platform deleted.');
  loadPlatforms();
}

async function loadModels() {
  const models = await api('/api/models');
  const sel = document.getElementById('variant_model_id');
  sel.innerHTML = '<option value="">Select Model</option>' + 
    models.map(m => `<option value="${m.id}">${m.model_name}</option>`).join('');
  renderModels();
}

async function renderModels() {
  const data = await api('/api/models-with-variants');
  document.getElementById('modelsList').innerHTML = data.map(m => `
    <div class="model-group">
      <div class="model-header">
        <span>${m.model_name}</span>
        <button class="btn-icon text-danger" onclick="deleteModel(${m.id})"><i class="bi bi-trash"></i></button>
      </div>
      ${m.variants.length ? m.variants.map(v => `
        <div class="variant-item">
          <span>${v.variant_name}</span>
          <button class="btn-icon text-danger" style="font-size:10px;" onclick="deleteVariant(${v.id})"><i class="bi bi-x-lg"></i></button>
        </div>
      `).join('') : `<div style="padding:8px 28px;font-size:12px;color:var(--muted);\">No variants yet</div>`}
    </div>
  `).join('');
}

async function addModel() {
  const name = document.getElementById('model_name').value.trim();
  if (!name) { showToast('Enter model name', 'error'); return; }
  const res = await api('/api/models', 'POST', {model_name: name});
  if (res.error) { showToast(res.error, 'error'); return; }
  document.getElementById('model_name').value = '';
  showToast('Model added!');
  await loadModels();
}

async function addVariant() {
  const model_id = document.getElementById('variant_model_id').value;
  const name     = document.getElementById('variant_name').value.trim();
  if (!model_id || !name) { showToast('Select model and enter variant name', 'error'); return; }
  const res = await api('/api/variants', 'POST', {model_id: parseInt(model_id), variant_name: name});
  if (res.error) { showToast(res.error, 'error'); return; }
  document.getElementById('variant_name').value = '';
  showToast('Variant added!');
  await renderModels();
}

async function deleteModel(id) {
  if (!confirm('Delete this model and ALL its variants?')) return;
  await api(`/api/models/${id}`, 'DELETE');
  showToast('Model deleted.');
  await loadModels();
}

async function deleteVariant(id) {
  await api(`/api/variants/${id}`, 'DELETE');
  showToast('Variant deleted.');
  await renderModels();
}

window.onload = () => { loadCards(); loadPlatforms(); loadModels(); };
</script>
{% endblock %}
