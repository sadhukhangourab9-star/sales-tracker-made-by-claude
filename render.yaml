services:
  - type: web
    name: order-tracker
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: GOOGLE_SHEET_NAME
        value: OrderTrack_DB
      # GOOGLE_CREDENTIALS_JSON must be added manually in the Render dashboard for security
